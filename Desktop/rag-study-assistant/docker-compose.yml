version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"  # Gradio UI
      - "8000:8000"  # FastAPI
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    environment:
      - OLLAMA_MODEL=llama3.2:3b
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - CHROMA_DB_PATH=/app/chroma_db
      - OLLAMA_HOST=host.docker.internal
    networks:
      - rag-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  ollama-data: